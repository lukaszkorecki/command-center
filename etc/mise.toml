[tools]
java = "temurin-25"

babashka = { version = "1.12.216", exe = "bb" }
clojure = "latest"
leiningen = "latest"
node = "25"

# there's some weird stuff going on with how 'official' op recipe works in Mise, so we just get this from source
"http:op" = { version = "2.32.1", url =  "https://cache.agilebits.com/dist/1P/op2/pkg/v2.32.1/op_darwin_arm64_v2.32.1.zip" }

# pull native binaries for clj-mcp-light tools
"http:clj-paren-repair" = { version = "0.2.2", url = "https://github.com/lukaszkorecki/clojure-mcp-light-native/releases/download/v0.2.2/clj-paren-repair-macos-arm64" }
"http:clj-nrepl-eval" = { version = "0.2.2", url = "https://github.com/lukaszkorecki/clojure-mcp-light-native/releases/download/v0.2.2/clj-nrepl-eval-macos-arm64" }

[settings]
idiomatic_version_file_enable_tools = ["node", "java"]
